    <head>

    <!-- CALCULATOR STYLES -->
    <style>
        #calculatorSection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        #settings, #estimates {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            font-family: "Roboto", sans-serif;
        }

        #settings h1, #estimates h1 {
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #111;
        }

        #settings input {
            width: 100%;
            padding: 10px 12px;
            margin-top: 8px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        #settings input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
        }

        #estimates div {
            background: #f9fafb;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            text-align: center;
            transition: 0.2s;
        }

        #estimates div:hover {
            transform: translateY(-2px);
            background: #f3f4f6;
            cursor: pointer;
        }

        #estimates h2 {
            font-size: 22px;
            font-weight: 700;
            color: #16a34a;
            margin: 0;
        }

        #estimates h3 {
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            margin-top: 6px;
        }

        @media (max-width: 800px) {
            #calculatorSection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
